# UF2-only build with UART console/logging only (no USB CDC).
CONFIG_CHIP_BOOTLOADER_NONE=y
CONFIG_BOOTLOADER_MCUBOOT=n
CONFIG_DFU_MULTI_IMAGE=n
CONFIG_DFU_TARGET=n
CONFIG_IMG_MANAGER=n

CONFIG_CHIP_OTA_REQUESTOR=n
CONFIG_CHIP_OTA_IMAGE_BUILD=n
CONFIG_CHIP_FACTORY_DATA=n
CONFIG_CHIP_FACTORY_DATA_BUILD=n

# Disable USB device stack and CDC ACM completely for this variant.
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USBD_CDC_ACM_CLASS=n
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n

# Route logs/console over UART only.
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_MINIMAL=n
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_MODE_IMMEDIATE=n
CONFIG_UART_LINE_CTRL=y

# Keep this in line with UF2 debug profile defaults.
CONFIG_TINYENV_DISABLE_BOARD_UI=y
CONFIG_CHIP_APP_LOG_LEVEL=2
CONFIG_MATTER_LOG_LEVEL_ERR=y
CONFIG_LOG_DEFAULT_LEVEL=2

# Keep USB-related PM behavior out of this profile.
CONFIG_PM=n
CONFIG_PM_DEVICE=n

# UF2 family ID for NRF52 (matches Seeed UF2 tooling).
CONFIG_BUILD_OUTPUT_UF2_FAMILY_ID="0xADA52840"
