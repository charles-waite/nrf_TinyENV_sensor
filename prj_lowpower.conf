# Low-power measurement profile.
# Use with prj.conf + prj_uf2.conf:
#   -DCONF_FILE=prj.conf -DEXTRA_CONF_FILE=prj_uf2.conf;prj_lowpower.conf

# Enable system/device power management.
CONFIG_PM=y
CONFIG_PM_DEVICE=y

# Disable interactive/debug interfaces for current measurements.
CONFIG_CHIP_LIB_SHELL=n
CONFIG_SHELL=n
CONFIG_OPENTHREAD_SHELL=n
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_SERIAL=n
CONFIG_LOG=n
CONFIG_PRINTK=n

# Keep USB stack disabled in low-power profile.
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USBD_CDC_ACM_CLASS=n
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=n

# Allow first-time provisioning in LP profile without reflashing.
# This auto-starts BLE commissioning when the device has no fabric.
CONFIG_CHIP_ENABLE_PAIRING_AUTOSTART=y
# Minimum allowed in this SDK is 15 minutes.
CONFIG_CHIP_BLE_ADVERTISING_DURATION=15

# Disable periodic LED/UI activity and startup scans.
CONFIG_TINYENV_DISABLE_BOARD_UI=y
CONFIG_TINYENV_ENABLE_STATUS_LED_ACTIVITY=n
CONFIG_TINYENV_ENABLE_BOOT_I2C_SCAN=n

# Commissioning-safe ICD tuning.
CONFIG_CHIP_ICD_ACTIVE_MODE_DURATION=300
CONFIG_CHIP_ICD_FAST_POLLING_INTERVAL=1000
CONFIG_CHIP_ICD_SLOW_POLL_INTERVAL=60000
CONFIG_CHIP_ICD_REPORT_ON_ACTIVE_MODE=n
CONFIG_CHIP_ICD_UAT_SUPPORT=n

# Thread TX power after commissioning hold ends (dBm).
CONFIG_TINYENV_POST_COMMISSION_THREAD_TX_POWER_DBM=0
