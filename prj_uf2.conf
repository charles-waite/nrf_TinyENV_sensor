# UF2-only build (no MCUboot/OTA/Factory Data generation).
CONFIG_CHIP_BOOTLOADER_NONE=y
CONFIG_BOOTLOADER_MCUBOOT=n
CONFIG_DFU_MULTI_IMAGE=n
CONFIG_DFU_TARGET=n
CONFIG_IMG_MANAGER=n

CONFIG_CHIP_OTA_REQUESTOR=n
CONFIG_CHIP_OTA_IMAGE_BUILD=n
CONFIG_CHIP_FACTORY_DATA=n
CONFIG_CHIP_FACTORY_DATA_BUILD=n

# USB CDC logging (new USB device stack).
CONFIG_USB_DEVICE_STACK=n
CONFIG_USB_DEVICE_STACK_NEXT=y
CONFIG_USBD_CDC_ACM_CLASS=y
CONFIG_CDC_ACM_SERIAL_INITIALIZE_AT_BOOT=y
CONFIG_CDC_ACM_SERIAL_MANUFACTURER_STRING="TinyENV"
CONFIG_CDC_ACM_SERIAL_PRODUCT_STRING="TinyENV nRF Sensor"
CONFIG_CDC_ACM_SERIAL_VID=0x2886
CONFIG_CDC_ACM_SERIAL_PID=0x8045
CONFIG_CDC_ACM_SERIAL_SELF_POWERED=y
CONFIG_CDC_ACM_SERIAL_MAX_POWER=50
CONFIG_UART_LINE_CTRL=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_MINIMAL=n
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_MODE_IMMEDIATE=n

CONFIG_TINYENV_DISABLE_BOARD_UI=y

# Keep USB alive while debugging enumeration.
CONFIG_PM=n
CONFIG_PM_DEVICE=n

# UF2 family ID for NRF52 (matches Seeed UF2 tooling).
CONFIG_BUILD_OUTPUT_UF2_FAMILY_ID="0xADA52840"
