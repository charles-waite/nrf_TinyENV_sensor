# UF2-only build (no MCUboot/OTA/Factory Data generation).
CONFIG_CHIP_BOOTLOADER_NONE=y
CONFIG_BOOTLOADER_MCUBOOT=n
CONFIG_DFU_MULTI_IMAGE=n
CONFIG_DFU_TARGET=n
CONFIG_IMG_MANAGER=n

CONFIG_CHIP_OTA_REQUESTOR=n
CONFIG_CHIP_OTA_IMAGE_BUILD=n
CONFIG_CHIP_FACTORY_DATA=n
CONFIG_CHIP_FACTORY_DATA_BUILD=n

# USB CDC logging (so /dev/tty.usbmodem* appears).
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_STACK_NEXT=n
CONFIG_USB_DEVICE_PRODUCT="TinyENV nRF Sensor"
CONFIG_USB_CDC_ACM=y
CONFIG_UART_LINE_CTRL=y
CONFIG_USB_DEVICE_INITIALIZE_AT_BOOT=y
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y
CONFIG_SERIAL=y
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_LOG_MODE_MINIMAL=n
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_MODE_IMMEDIATE=n

# USB descriptors (use test VID/PID).
CONFIG_USB_DEVICE_VID=0x2FE3
CONFIG_USB_DEVICE_PID=0x0100
CONFIG_USB_DEVICE_MANUFACTURER="TinyENV"
