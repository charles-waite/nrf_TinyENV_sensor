sample:
  description: Matter Temperature Sensor example
  name: Matter Temperature Sensor
common:
  tags:
    - sysbuild
    - ci_samples_matter
tests:
  sample.matter.temperature_sensor.debug:
    sysbuild: true
    build_only: true
    integration_platforms:
      - xiao_ble
    platform_allow:
      - xiao_ble
  sample.matter.temperature_sensor.release:
    sysbuild: true
    build_only: true
    extra_args:
      - FILE_SUFFIX=release
    integration_platforms:
      - xiao_ble
    platform_allow:
      - xiao_ble
